{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eliminar usuario</title>
  <link rel="stylesheet" href="{% static 'inventory/device_list.css' %}">
  <link rel="stylesheet" href="{% static 'inventory/agent_wizard.css' %}">
  <link rel="stylesheet" href="{% static 'inventory/corporate.css' %}">
</head>
<body>
  {% include "inventory/partials/app_header.html" with active_menu="users" %}

  <main class="content">
    <header class="topbar">
      <div>
        <h1>Eliminar usuario</h1>
        <p>Esta accion no se puede deshacer.</p>
      </div>
      <div class="top-actions">
        <a href="{% url 'user-list' %}">Cancelar</a>
      </div>
    </header>

    <form class="wizard-card user-form" method="post">
      {% csrf_token %}
      <div class="step-label">Confirmacion</div>
      <h2>{{ managed_user.username }}</h2>
      <p>Confirma que deseas eliminar este usuario.</p>
      <button class="submit-button danger-button" type="submit">Eliminar usuario</button>
    </form>
  </main>
</body>
</html>
