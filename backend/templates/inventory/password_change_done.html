{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contraseña actualizada</title>
  <link rel="stylesheet" href="{% static 'inventory/device_list.css' %}">
  <link rel="stylesheet" href="{% static 'inventory/agent_wizard.css' %}">
</head>
<body>
  <header class="app-header">
    <a class="app-brand" href="{% url 'device-list' %}">
      <img src="{% static 'inventory/logo.png' %}" alt="AGFA HealthCare">
      <span>Monitor de servidores</span>
    </a>
    <nav class="app-nav" aria-label="Menu principal">
      <a href="{% url 'device-list' %}">Dispositivos</a>
      <a href="{% url 'agent-install' %}">Instalar agente</a>
      <a href="{% url 'user-list' %}">Usuarios</a>
      <a href="{% url 'admin:index' %}">Admin</a>
    </nav>
    <div class="app-actions">
      <details class="account-menu">
        <summary>{{ request.user.username }}</summary>
        <div class="account-dropdown">
          <a href="{% url 'profile' %}">Editar perfil</a>
          <a href="{% url 'password-change' %}">Cambiar contraseña</a>
          <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit">Cerrar sesión</button>
          </form>
        </div>
      </details>
    </div>
  </header>

  <main class="content">
    <header class="topbar">
      <div>
        <h1>Contraseña actualizada</h1>
        <p>Tu contraseña fue cambiada correctamente.</p>
      </div>
      <div class="top-actions">
        <a href="{% url 'device-list' %}">Volver a dispositivos</a>
      </div>
    </header>
  </main>
</body>
</html>
