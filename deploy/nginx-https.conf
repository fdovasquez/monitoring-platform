server {
    listen 80;
    server_name MONITOR.DOMINIO.O.IP;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name MONITOR.DOMINIO.O.IP;

    ssl_certificate /etc/monitoring-platform/tls/certificate.pem;
    ssl_certificate_key /etc/monitoring-platform/tls/private.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:TLS:10m;

    client_max_body_size 10M;

    location /static/ { alias /opt/monitoring-platform/backend/staticfiles/; }
    location /media/ { alias /opt/monitoring-platform/backend/media/; }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
